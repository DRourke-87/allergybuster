name: iOS Build (IPA)

# Manual-only. Produces an UNSIGNED .ipa for sideloading onto a real device
# (e.g. with Sideloadly / AltStore on Windows, signing with a free Apple ID).
# There is no automatic trigger and no code-signing here — a paid Apple
# Developer account + a separate signed workflow is needed for TestFlight.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build app for device (unsigned)
        run: |
          xcodebuild build \
            -project iosApp/AllergyBuster.xcodeproj \
            -scheme AllergyBuster \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -quiet

      - name: Package .app into an unsigned .ipa
        run: |
          APP=$(find DerivedData/Build/Products/Debug-iphoneos -maxdepth 1 -name "AllergyBuster.app" | head -1)
          if [ -z "$APP" ]; then
            echo "::error::Could not find built AllergyBuster.app"
            exit 1
          fi
          echo "Packaging: $APP"
          mkdir -p ipa/Payload
          cp -R "$APP" ipa/Payload/
          (cd ipa && zip -qr AllergyBuster-unsigned.ipa Payload)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-ios-unsigned-${{ github.sha }}
          path: ipa/AllergyBuster-unsigned.ipa
          retention-days: 30
          if-no-files-found: error
