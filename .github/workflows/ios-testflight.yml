name: iOS TestFlight Release

# Builds a signed .ipa and uploads it to TestFlight.
# Mirrors the Android release.yml trigger (v*.*.* tags + manual dispatch).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   IOS_DISTRIBUTION_CERTIFICATE_BASE64   base64-encoded Apple Distribution .p12
#   IOS_DISTRIBUTION_CERTIFICATE_PASSWORD password for the .p12
#   IOS_PROVISIONING_PROFILE_BASE64       base64-encoded App Store .mobileprovision
#   IOS_TEAM_ID                           10-character Apple Developer team ID
#   APP_STORE_CONNECT_KEY_ID              App Store Connect API key ID (e.g. ABC1234567)
#   APP_STORE_CONNECT_ISSUER_ID           API key issuer UUID
#   APP_STORE_CONNECT_API_KEY_BASE64      base64-encoded .p8 API private key
#
# How to obtain each secret:
#   Certificate + profile: Xcode → Settings → Accounts → Manage Certificates →
#     create "Apple Distribution"; export as .p12. Create an "App Store"
#     provisioning profile at developer.apple.com and download the .mobileprovision.
#   Team ID: developer.apple.com → Account → Membership → Team ID
#   API key: App Store Connect → Users and Access → Integrations → Keys → (+)
#     Select "Developer" role; download the .p8 once (not retrievable again).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Cache Kotlin/Native compiler
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run shared Kotlin unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Install certificate and provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Temporary keychain scoped to this runner
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

          # Import distribution certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

          # Install provisioning profile; export its UUID for use in later steps
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          security cms -D -i profile.mobileprovision -o /tmp/decoded_profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/decoded_profile.plist)
          rm /tmp/decoded_profile.plist
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=${PROFILE_UUID}" >> "$GITHUB_ENV"
          rm profile.mobileprovision

      - name: Inject team ID and profile UUID into ExportOptions.plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          sed -i '' \
            -e "s/TEAM_ID_PLACEHOLDER/${IOS_TEAM_ID}/g" \
            -e "s/PROFILE_UUID_PLACEHOLDER/${PROFILE_UUID}/g" \
            iosApp/ExportOptions.plist

      - name: Archive
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/AllergyBuster.xcodeproj \
            -scheme AllergyBuster \
            -configuration Release \
            -sdk iphoneos \
            -archivePath AllergyBuster.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath AllergyBuster.xcarchive \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -exportPath export/

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file export/AllergyBuster.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-ios-${{ github.ref_name }}-${{ github.run_number }}
          path: export/AllergyBuster.ipa
          retention-days: 90
          if-no-files-found: warn

      - name: Clean up keychain
        if: always()
        run: security delete-keychain build.keychain || true
