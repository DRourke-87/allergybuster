name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & sign release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ALLERGYBUSTER_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ALLERGYBUSTER_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
          test -s app/keystore.jks

      - name: Lint + unit tests
        run: ./gradlew :app:lint :app:testDebugUnitTest --no-daemon

      - name: Build signed release bundle
        env:
          ALLERGYBUSTER_KEYSTORE_PATH: keystore.jks
          ALLERGYBUSTER_KEYSTORE_PASSWORD: ${{ secrets.ALLERGYBUSTER_KEYSTORE_PASSWORD }}
          ALLERGYBUSTER_KEY_ALIAS: ${{ secrets.ALLERGYBUSTER_KEY_ALIAS }}
          ALLERGYBUSTER_KEY_PASSWORD: ${{ secrets.ALLERGYBUSTER_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: error

      - name: Upload R8 mapping
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Wipe keystore
        if: always()
        run: rm -f app/keystore.jks

  # ── iOS ───────────────────────────────────────────────────────────────────
  release-ios:
    name: Build & sign iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Import distribution certificate
        env:
          IOS_CERT_BASE64:     ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_CERT_PASSWORD:   ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD:   ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          KC_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$IOS_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security set-keychain-settings -lut 21600 "$KC_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC_PATH"
          security import "$CERT_PATH" -P "$IOS_CERT_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KC_PATH"
          security list-keychain -d user -s "$KC_PATH"

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64:    ${{ secrets.IOS_APP_PROVISION_PROFILE_BASE64 }}
          WIDGET_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_DIR=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_DIR"
          echo -n "$APP_PROFILE_BASE64"    | base64 --decode -o "$PP_DIR/app.mobileprovision"
          echo -n "$WIDGET_PROFILE_BASE64" | base64 --decode -o "$PP_DIR/widget.mobileprovision"

      - name: Inject team ID into ExportOptions
        env:
          TEAM_ID: ${{ secrets.IOS_DEVELOPMENT_TEAM_ID }}
        run: sed -i '' "s/REPLACE_TEAM_ID/$TEAM_ID/" iosApp/ExportOptions.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -project iosApp/AllergyBuster.xcodeproj \
            -scheme AllergyBuster \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/AllergyBuster.xcarchive" \
            -quiet

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/AllergyBuster.xcarchive" \
            -exportPath    "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -quiet

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_KEY_BASE64" | base64 --decode \
            -o ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/AllergyBuster.ipa" \
            --apiKey    "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-ios-${{ github.ref_name }}
          path: ${{ runner.temp }}/ipa/AllergyBuster.ipa
          retention-days: 90
          if-no-files-found: error

      - name: Clean up keychain and profiles
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
          rm -f ~/.appstoreconnect/private_keys/*.p8
