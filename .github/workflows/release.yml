name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  repository_dispatch:
    types:
      - release-aab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & sign release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ALLERGYBUSTER_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::ALLERGYBUSTER_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
          test -s app/keystore.jks

      - name: Lint + unit tests
        run: ./gradlew :app:lint :app:testDebugUnitTest --no-daemon

      - name: Build signed release bundle
        env:
          ALLERGYBUSTER_KEYSTORE_PATH: keystore.jks
          ALLERGYBUSTER_KEYSTORE_PASSWORD: ${{ secrets.ALLERGYBUSTER_KEYSTORE_PASSWORD }}
          ALLERGYBUSTER_KEY_ALIAS: ${{ secrets.ALLERGYBUSTER_KEY_ALIAS }}
          ALLERGYBUSTER_KEY_PASSWORD: ${{ secrets.ALLERGYBUSTER_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: error

      - name: Upload R8 mapping
        uses: actions/upload-artifact@v4
        with:
          name: allergybuster-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Wipe keystore
        if: always()
        run: rm -f app/keystore.jks

  # iOS release is handled by Codemagic (see codemagic.yaml)
