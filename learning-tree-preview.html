<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AllergyBuster – Learning Tree</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a2214;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    gap: 24px;
    padding: 32px 16px;
  }
  h1 {
    color: #B4DFAA;
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ── Card ── */
  .card {
    background: #1e2d17;
    border-radius: 20px;
    padding: 16px;
    width: 340px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .tree-wrap {
    flex-shrink: 0;
    width: 88px;
    height: 88px;
  }
  canvas {
    display: block;
  }
  .info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .label-large {
    font-size: 13px;
    font-weight: 600;
    color: #d7f2cc;
    margin-bottom: 2px;
  }
  .body-small {
    font-size: 11px;
    color: #8fba84;
    margin-bottom: 8px;
  }
  .progress-track {
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: rgba(46,107,26,0.18);
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: #2E6B1A;
    width: 0%;
    transition: width 0.05s linear;
  }
  .hint {
    font-size: 10px;
    color: rgba(143,186,132,0.7);
  }

  /* ── Mature pill ── */
  .mature-pill {
    background: #B4DFAA;
    border-radius: 50px;
    padding: 8px 16px;
    width: 340px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .mature-pill canvas {
    flex-shrink: 0;
  }
  .mature-label {
    font-size: 13px;
    font-weight: 600;
    color: #0A2D04;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 340px;
  }
  input[type=range] {
    width: 100%;
    accent-color: #2E6B1A;
    cursor: pointer;
  }
  .btn-row {
    display: flex;
    gap: 10px;
  }
  button {
    background: #2E6B1A;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  button:hover { background: #3a8522; }
  .pct-label {
    font-size: 12px;
    color: #8fba84;
  }
</style>
</head>
<body>

<h1>Learning Tree Preview</h1>

<!-- Growing card -->
<div class="card" id="growing-card">
  <div class="tree-wrap">
    <canvas id="tree" width="88" height="88"></canvas>
  </div>
  <div class="info">
    <div class="label-large">Learning your allergies</div>
    <div class="body-small" id="subtitle">Day 0 of 30 · 0 check-ins</div>
    <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
    <div class="hint">Tap a leaf below to help me grow</div>
  </div>
</div>

<!-- Mature pill (hidden until 100%) -->
<div class="mature-pill" id="mature-pill" style="display:none">
  <canvas id="tree-mature" width="32" height="32"></canvas>
  <span class="mature-label">Fully personalised</span>
</div>

<!-- Controls -->
<div class="controls">
  <input type="range" id="slider" min="0" max="100" value="0" step="1">
  <div class="pct-label" id="pct-label">0% — drag the slider or press Play</div>
  <div class="btn-row">
    <button id="btn-play">▶ Play</button>
    <button id="btn-reset">↺ Reset</button>
  </div>
</div>

<script>
// ── Colours (from Compose theme) ──────────────────────────────────────
const BARK_BROWN        = '#7A5840';
const FOREST_GREEN      = '#2E6B1A';
const SPRING_LEAF       = '#B4DFAA';
const SUNLIGHT_GOLD     = '#A07828';

// ── Leaf cluster data (mirrors LEAF_CLUSTERS in Kotlin) ───────────────
const LEAF_CLUSTERS = [
  { xf: 0.50, yf: 0.55, rf: 0.14, threshold: 0.05 },
  { xf: 0.32, yf: 0.42, rf: 0.16, threshold: 0.20 },
  { xf: 0.68, yf: 0.42, rf: 0.16, threshold: 0.35 },
  { xf: 0.50, yf: 0.28, rf: 0.18, threshold: 0.55 },
  { xf: 0.26, yf: 0.30, rf: 0.13, threshold: 0.75 },
  { xf: 0.74, yf: 0.30, rf: 0.13, threshold: 0.90 },
];

// ── Colour helpers ────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function lerpColor(a, b, t) {
  const [ar,ag,ab] = hexToRgb(a);
  const [br,bg,bb] = hexToRgb(b);
  const r = Math.round(ar + (br-ar)*t);
  const g = Math.round(ag + (bg-ag)*t);
  const bv = Math.round(ab + (bb-ab)*t);
  return `rgb(${r},${g},${bv})`;
}
function withAlpha(hex, alpha) {
  const [r,g,b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Core draw function ────────────────────────────────────────────────
function drawTree(canvas, progress) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const p = Math.max(0, Math.min(1, progress));

  ctx.clearRect(0, 0, w, h);

  const groundY     = h * 0.92;
  const trunkHeight = (0.30 + 0.55 * p) * h;
  const trunkTopY   = groundY - trunkHeight;
  const trunkWidth  = w * 0.10;
  const trunkCenterX = w * 0.5;

  // Trunk
  ctx.strokeStyle = BARK_BROWN;
  ctx.lineWidth   = trunkWidth;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(trunkCenterX, groundY);
  ctx.lineTo(trunkCenterX, trunkTopY);
  ctx.stroke();

  // Branches (appear at 25% progress)
  if (p > 0.25) {
    const bp     = Math.min(1, (p - 0.25) / 0.55);
    const bLen   = w * 0.22 * bp;
    const bOriginY = trunkTopY + trunkHeight * 0.25;
    ctx.strokeStyle = BARK_BROWN;
    ctx.lineWidth   = trunkWidth * 0.55;
    ctx.lineCap     = 'round';
    // Left branch
    ctx.beginPath();
    ctx.moveTo(trunkCenterX, bOriginY);
    ctx.lineTo(trunkCenterX - bLen, bOriginY - bLen * 0.6);
    ctx.stroke();
    // Right branch
    ctx.beginPath();
    ctx.moveTo(trunkCenterX, bOriginY);
    ctx.lineTo(trunkCenterX + bLen, bOriginY - bLen * 0.6);
    ctx.stroke();
  }

  // Leaf clusters
  const canopyTop    = trunkTopY - h * 0.05;
  const canopyHeight = trunkHeight * 0.85;
  LEAF_CLUSTERS.forEach(cl => {
    if (p >= cl.threshold) {
      const lp     = Math.min(1, (p - cl.threshold) / (1 - cl.threshold));
      const cx     = w * cl.xf;
      const cy     = canopyTop + canopyHeight * cl.yf;
      const radius = w * cl.rf * (0.55 + 0.45 * lp);
      const color  = lerpColor(SPRING_LEAF, FOREST_GREEN, p);
      const alpha  = Math.min(1, 0.55 + 0.45 * lp);
      ctx.fillStyle = color.replace('rgb(', 'rgba(').replace(')', `,${alpha})`);
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Sun (fades in past 50%)
  if (p > 0.5) {
    const sunAlpha = Math.min(1, (p - 0.5) / 0.5) * 0.85;
    ctx.fillStyle  = withAlpha(SUNLIGHT_GOLD, sunAlpha);
    ctx.beginPath();
    ctx.arc(w * 0.88, h * 0.12, w * 0.07, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── UI update ─────────────────────────────────────────────────────────
const mainCanvas  = document.getElementById('tree');
const matureCanvas = document.getElementById('tree-mature');
const slider      = document.getElementById('slider');
const bar         = document.getElementById('bar');
const subtitle    = document.getElementById('subtitle');
const pctLabel    = document.getElementById('pct-label');
const growingCard = document.getElementById('growing-card');
const maturePill  = document.getElementById('mature-pill');

function update(pct) {
  const p = pct / 100;
  drawTree(mainCanvas, p);
  drawTree(matureCanvas, 1.0);

  bar.style.width = pct + '%';
  const days   = Math.round(p * 30);
  const checkins = Math.round(p * 30);
  const label  = checkins === 1 ? 'check-in' : 'check-ins';
  subtitle.textContent = `Day ${days} of 30 · ${checkins} ${label}`;
  pctLabel.textContent = `${pct}%${pct >= 100 ? ' — Fully personalised!' : ' — drag the slider or press Play'}`;

  if (pct >= 100) {
    growingCard.style.display = 'none';
    maturePill.style.display  = 'flex';
  } else {
    growingCard.style.display = 'flex';
    maturePill.style.display  = 'none';
  }
}

slider.addEventListener('input', () => update(parseInt(slider.value)));

// ── Play animation ────────────────────────────────────────────────────
let animFrame = null;
let animPct   = 0;
let playing   = false;

function stopAnim() {
  cancelAnimationFrame(animFrame);
  playing = false;
  document.getElementById('btn-play').textContent = '▶ Play';
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (playing) { stopAnim(); return; }
  if (animPct >= 100) animPct = 0;
  playing = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  const startTime = performance.now();
  const duration  = 6000; // 6 s for 0→100
  const startPct  = animPct;

  function tick(now) {
    const elapsed = now - startTime;
    const t       = Math.min(elapsed / duration, 1);
    // ease-in-out cubic
    const ease    = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
    animPct = startPct + (100 - startPct) * ease;
    const pct = Math.round(animPct);
    slider.value = pct;
    update(pct);
    if (t < 1) {
      animFrame = requestAnimationFrame(tick);
    } else {
      stopAnim();
      animPct = 100;
    }
  }
  animFrame = requestAnimationFrame(tick);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  stopAnim();
  animPct = 0;
  slider.value = 0;
  update(0);
});

// Initial render
update(0);
</script>
</body>
</html>
